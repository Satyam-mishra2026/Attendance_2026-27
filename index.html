<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Academy - Attendance Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #141e30, #243b55); 
            min-height: 100vh; 
            padding: 15px; 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow-x: hidden;
        }
        
        /* Login Card Wrapper */
        .login-card { 
            background: rgba(255, 255, 255, 0.06); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 15px; 
            width: 100%; 
            max-width: 400px; 
            padding: 30px; 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); 
            text-align: center; 
        }

        /* --- ANIMATION EFFECTS --- */
        .slide-right {
            animation: slideFromRight 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .slide-left {
            animation: slideFromLeft 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes slideFromRight {
            0% { transform: translateX(120px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideFromLeft {
            0% { transform: translateX(-120px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        .login-card h3 { margin-bottom: 25px; font-weight: 600; font-size: 26px; color: #00adb5; text-shadow: 0 2px 10px rgba(0, 173, 181, 0.2); }
        .input-group { margin-bottom: 18px; text-align: left; }
        .input-group label { display: block; margin-bottom: 6px; font-size: 14px; color: #ccc; letter-spacing: 0.5px; }
        
        .input-group input, .input-group select { width: 100%; padding: 13px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 8px; color: white; font-size: 16px; outline: none; appearance: none; -webkit-appearance: none; transition: 0.3s; }
        .input-group select option { background: #141e30; color: #fff; }
        .input-group input:focus, .input-group select:focus { border-color: #00adb5; background: rgba(255, 255, 255, 0.12); box-shadow: 0 0 10px rgba(0, 173, 181, 0.2); }
        
        .login-btn { width: 100%; padding: 14px; background: #00adb5; border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(0, 173, 181, 0.3); }
        .login-btn:hover { background: #008c95; transform: translateY(-1px); }
        .login-error { color: #e74c3c; font-size: 14px; margin-top: 15px; display: none; font-weight: bold; }

        /* Register Card Style */
        .register-card { display: none; background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; width: 100%; max-width: 600px; padding: 25px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); animation: fadeIn 0.5s ease-in-out; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Header Designs (Logo & Batch) */
        .portal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid rgba(255, 255, 255, 0.1); }
        .logo-box { background: linear-gradient(45deg, #00adb5, #007a80); padding: 8px 15px; border-radius: 8px; font-weight: bold; font-size: 18px; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(0, 173, 181, 0.3); text-transform: uppercase; }
        .batch-badge { background: linear-gradient(45deg, #f1c40f, #f39c12); color: #000; padding: 6px 14px; border-radius: 20px; font-weight: bold; font-size: 14px; box-shadow: 0 4px 10px rgba(241, 196, 15, 0.3); text-transform: uppercase; animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        h2 { text-align: center; margin-bottom: 20px; font-weight: 500; font-size: 22px; color: #eee; }
        .date-section { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.05); padding: 10px 15px; border-radius: 10px; }
        .date-section input[type="date"] { background: #00adb5; border: none; color: white; padding: 8px 12px; border-radius: 5px; font-size: 16px; font-weight: bold; outline: none; }
        
        .attendance-table { width: 100%; margin-bottom: 20px; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); transition: 0.2s; }
        .row:hover { background: rgba(255, 255, 255, 0.02); border-radius: 8px; }
        .name-column { font-size: 16px; font-weight: 500; flex: 1; }
        .options-column { display: flex; gap: 10px; }
        .radio-label { display: inline-block; cursor: pointer; }
        .radio-label input[type="radio"] { display: none; }
        .btn-status { display: inline-block; width: 40px; height: 40px; line-height: 40px; text-align: center; border-radius: 8px; background: rgba(255, 255, 255, 0.1); font-weight: bold; font-size: 14px; transition: 0.2s; border: 1px solid rgba(255, 255, 255, 0.1); }
        
        input[type="radio"][value="P"]:checked + .btn-status { background: #2ecc71; color: #fff; box-shadow: 0 0 10px rgba(46, 204, 113, 0.5); }
        input[type="radio"][value="A"]:checked + .btn-status { background: #e74c3c; color: #fff; box-shadow: 0 0 10px rgba(231, 76, 60, 0.5); }
        input[type="radio"][value="L"]:checked + .btn-status { background: #f1c40f; color: #000; box-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        
        .submit-btn { width: 100%; padding: 15px; background: #00adb5; border: none; border-radius: 10px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 173, 181, 0.4); transition: 0.2s; }
        .submit-btn:disabled { background: #555; cursor: not-allowed; }
        .alert-box { display: none; text-align: center; margin-top: 15px; padding: 10px; border-radius: 8px; font-weight: bold; }
        .success { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .error { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }

        /* Beautiful Footer Design */
        .credit-footer { 
            text-align: center; 
            margin-top: 20px; 
            font-size: 13px; 
            color: rgba(255, 255, 255, 0.4); 
            letter-spacing: 1px;
            font-weight: 400;
        }
        .credit-footer span {
            color: #00adb5;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="login-card" id="loginBox">
    <h3 class="slide-right">Portal Login</h3>
    
    <div class="input-group slide-left">
        <label>Login As</label>
        <select id="loginRole">
            <option value="" disabled selected hidden>Choose Role...</option>
            <option value="admin">Admin</option>
            <option value="teacher">Teacher</option>
        </select>
    </div>
    
    <div class="input-group slide-right">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter Username">
    </div>
    
    <div class="input-group slide-left">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter Password">
    </div>
    
    <button class="login-btn slide-right" onclick="checkLogin()">Login</button>
    <div class="login-error" id="loginError">❌ Username, Password ya Role galat hai!</div>
</div>

<div class="register-card" id="attendanceBox">
    
    <div class="portal-header">
        <div class="logo-box">Smart Academy</div>
        <div class="batch-badge">Batch 3</div>
    </div>
    
    <h2>Attendance Register</h2>
    
    <div class="date-section">
        <label style="font-size: 16px;">Date:</label>
        <input type="date" id="attendanceDate">
    </div>

    <form id="registerForm">
        <div class="attendance-table" id="staffList"></div>
        <button type="submit" id="saveBtn" class="submit-btn">Save Attendance</button>
        <div id="alert" class="alert-box"></div>
        
       <div class="credit-footer">Powered by <span>Veda Institute</span> <span>@ Satyam Mishra</span></div>
    </form>
</div>

<script>
    const adminUser = { username: "Satyam Mishra", password: "veda@admin" };

    const teacherUsers = [
        { username: "satyam1", password: "veda@teacher1" },
        { username: "satyam2", password: "veda@teacher2" },
        { username: "satyam3", password: "veda@teacher3" }
    ];

    const staffMembers = [
        "Satyam Mishra",
        "Amit Sharma",
        "Rahul Kumar",
        "Priya Singh",
        "Vikas Yadav"
    ];

    // 🔗 APNA DEPLOYED WEB APP URL YAHAN PASTE KAREIN
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx59-svXvmkUqgyB_YmugVZTerF4tZkQNL27iEASA8TgboLAOk-qg5HpG_p9TU5ZXvn/exec';

    function checkLogin() {
        const role = document.getElementById('loginRole').value;
        const userInp = document.getElementById('username').value.trim();
        const passInp = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('loginError');
        
        let loginSuccess = false;

        if (!role) {
            errorMsg.textContent = "❌ Please choose a role first!";
            errorMsg.style.display = 'block';
            return;
        }

        if (role === "admin") {
            if (userInp === adminUser.username && passInp === adminUser.password) {
                loginSuccess = true;
            }
        } else if (role === "teacher") {
            for (let i = 0; i < teacherUsers.length; i++) {
                if (userInp === teacherUsers[i].username && passInp === teacherUsers[i].password) {
                    loginSuccess = true;
                    break;
                }
            }
        }

        if (loginSuccess) {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('attendanceBox').style.display = 'block';
            loadAttendanceSystem();
        } else {
            errorMsg.textContent = "❌ Username, Password ya Role galat hai!";
            errorMsg.style.display = 'block';
        }
    }

    function loadAttendanceSystem() {
        document.getElementById('attendanceDate').valueAsDate = new Date();
        const listContainer = document.getElementById('staffList');
        listContainer.innerHTML = "";
        
        staffMembers.forEach((name, index) => {
            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `
                <div class="name-column">${name}</div>
                <div class="options-column">
                    <label class="radio-label"><input type="radio" name="status_${index}" value="P" checked><span class="btn-status">P</span></label>
                    <label class="radio-label"><input type="radio" name="status_${index}" value="A"><span class="btn-status">A</span></label>
                    <label class="radio-label"><input type="radio" name="status_${index}" value="L"><span class="btn-status">L</span></label>
                </div>
            `;
            listContainer.appendChild(row);
        });
    }

    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const saveBtn = document.getElementById('saveBtn');
        const alertBox = document.getElementById('alert');
        const selectedDate = document.getElementById('attendanceDate').value;
        
        saveBtn.disabled = true;
        saveBtn.textContent = "Saving to Sheet...";
        
        let finalData = [];
        staffMembers.forEach((name, index) => {
            const status = document.querySelector(`input[name="status_${index}"]:checked`).value;
            finalData.push({ date: selectedDate, name: name, status: status });
        });

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(finalData)
        })
        .then(() => {
            alertBox.textContent = "✓ Data Successfully Saved to Google Sheet!";
            alertBox.className = "alert-box success";
            alertBox.style.display = 'block';
            saveBtn.disabled = false;
            saveBtn.textContent = "Save Attendance";
            setTimeout(() => { alertBox.style.display = 'none'; }, 3000);
        })
        .catch(error => {
            alertBox.textContent = "❌ Error: Could not save data.";
            alertBox.className = "alert-box error";
            alertBox.style.display = 'block';
            saveBtn.disabled = false;
            saveBtn.textContent = "Save Attendance";
            console.error('Error!', error.message);
        });
    });
</script>
</body>
</html>
